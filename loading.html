<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM-NET | Loading...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .logo {
            width: 100px;
            height: 100px;
            position: relative;
            margin-bottom: 2rem;
        }

        .ring {
            position: absolute;
            border: 3px solid #2563eb;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 2s ease-out infinite;
        }

        .ring:nth-child(1) { width: 100%; height: 100%; }
        .ring:nth-child(2) { width: 70%; height: 70%; animation-delay: 0.5s; }
        .ring:nth-child(3) { width: 40%; height: 40%; animation-delay: 1s; }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        .logo i {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            color: #2563eb;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #2563eb, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p { color: #64748b; margin-bottom: 2rem; }

        .progress-container {
            width: 400px;
            max-width: 90%;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .progress-bar {
            height: 8px;
            background: rgba(0,0,0,0.08);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #10b981);
            width: 0%;
            transition: width 0.1s linear;
        }

        .skip {
            position: fixed;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #64748b;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s;
        }

        .skip.show { opacity: 1; }
        .skip:hover { border-color: #2563eb; color: #2563eb; }

        .fade-out {
            animation: fadeOut 0.5s ease forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <button class="skip" id="skipBtn" onclick="finish()">Skip</button>

    <div class="logo">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <i class="fas fa-network-wired"></i>
    </div>

    <h1>SIM-NET</h1>
    <p>Smart Network Management System</p>

    <div class="progress-container">
        <div class="progress-info">
            <span id="status">Loading...</span>
            <span id="percent">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="fill"></div>
        </div>
    </div>

    <script>
        // 15 seconds
        const DURATION = 15000;
        let progress = 0;
        let done = false;

        function update() {
            if (done) return;

            progress += 100 / (DURATION / 100);

            document.getElementById('fill').style.width = progress + '%';
            document.getElementById('percent').textContent = Math.floor(progress) + '%';

            // Update text
            if (progress > 25) document.getElementById('status').textContent = 'Connecting...';
            if (progress > 50) document.getElementById('status').textContent = 'Loading data...';
            if (progress > 75) document.getElementById('status').textContent = 'Initializing...';

            if (progress >= 100) {
                finish();
            } else {
                setTimeout(update, 100);
            }
        }

        function finish() {
            if (done) return;
            done = true;

            sessionStorage.setItem('simnet_loaded', 'true');
            document.body.classList.add('fade-out');

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 500);
        }

        // Show skip button after 10 seconds
        setTimeout(() => {
            document.getElementById('skipBtn').classList.add('show');
        }, 10000);

        // Start loading
        update();
    </script>
</body>
</html>
